---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: atomixp
# description will be included in the image's metadata
description: Experimental bluebuild image with XFCE aiming to create an "XP" like experience.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/base-main
image-version: 43

modules:
  - type: rpm-ostree
    install:
        - xfce4-session
        - xfce4-panel
        - xfdesktop
        - xfwm4
        - xfconf
        - xorg-x11-server-Xorg
        - xorg-x11-xinit
        - xorg-x11-drv-amdgpu
        - xorg-x11-drv-libinput
        - network-manager-applet
        - thunar
        - thunar-archive-plugin
        - sddm
        - gtk-murrine-engine
        - gtk2-engines
        - pavucontrol
        - fastfetch
        - xfce4-terminal
        - adwaita-gtk2-theme
        - alsa-utils
        - blueman
        - gtk-xfce-engine
        - xfce4-about
        - xfce4-appfinder
        - xfce4-settings


  - type: files
    files:
     - source: system
       destination: /

#  - type: script
#    scripts:
#      - xfceconf.sh
      
  - type: systemd
    system:
      enabled:
        - sddm